{% extends 'admin_panel/admin_base.html' %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-warning">

                    <h4 class="mb-0">

                        Add Category

                    </h4>

                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">

                                Category Name

                            </label>

                            <input
                                type="text"
                                name="cat_name"
                                class="form-control"
                                placeholder="Enter Category Name"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success">

                            Save Category

                        </button>

                        <a href="{% url 'categories' %}"
                           class="btn btn-secondary">

                            Cancel

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
