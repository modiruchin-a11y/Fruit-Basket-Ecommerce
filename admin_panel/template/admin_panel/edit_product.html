{% extends 'admin_panel/admin_base.html' %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h4 class="mb-0">
                        Edit Product
                    </h4>

                </div>

                <div class="card-body">

                    <form method="POST" enctype="multipart/form-data">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Product Name
                            </label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                value="{{ product.name }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Category
                            </label>

                            <select
                                name="category"
                                class="form-select"
                                required>

                                {% for category in categories %}

                                <option value="{{ category.id }}"
                                    {% if category.id == product.cat.id %}
                                        selected
                                    {% endif %}>

                                    {{ category.cat_name }}

                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Price
                                </label>

                                <input
                                    type="number"
                                    name="price"
                                    class="form-control"
                                    value="{{ product.price }}"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Quantity
                                </label>

                                <input
                                    type="number"
                                    name="quantity"
                                    class="form-control"
                                    value="{{ product.quantity }}"
                                    required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea
                                name="description"
                                rows="4"
                                class="form-control"
                                required>{{ product.description }}</textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Current Image
                            </label>

                            <br>

                            <img src="{{ product.image.url }}"
                                 width="120"
                                 class="rounded shadow">

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Change Image
                            </label>

                            <input
                                type="file"
                                name="image"
                                class="form-control">

                            <small class="text-muted">

                                Leave empty to keep the current image.

                            </small>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success">

                            Update Product

                        </button>

                        <a href="{% url 'products' %}"
                           class="btn btn-secondary">

                            Cancel

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
