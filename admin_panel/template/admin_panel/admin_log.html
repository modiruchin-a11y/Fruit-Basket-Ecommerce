{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login | Fruit Shop</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/admin_log.css' %}">

</head>

<body>

<div class="login-container">

    <div class="login-card shadow-lg">

        <div class="text-center mb-4">

           <h2 class="fw-bold text-warning d-flex justify-content-center align-items-center mb-3">
    <img src="{% static 'images/Fruits Basket.png' %}"
         alt="Logo"
         width="45"
         height="45"
         class="me-2 rounded-circle">

    Fruits Basket

</h2>

            <h5 class="text-dark">

                Admin Login

            </h5>

        </div>

        {% if messages %}

            {% for message in messages %}

                <div class="alert alert-danger">

                    {{ message }}

                </div>

            {% endfor %}

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">

                    Username

                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter Username"
                       required>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Password

                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter Password"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-warning w-100 fw-bold">

                <i class="bi bi-box-arrow-in-right"></i>

                Login

            </button>

        </form>

    </div>

</div>

</body>

</html>
