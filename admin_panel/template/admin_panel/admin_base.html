{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fruit Shop Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/admin_base.css' %}">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark bg-warning shadow-sm">

    <div class="container-fluid">

       <span class="navbar-brand fw-bold fs-3 text-dark d-flex align-items-center">
        <img src="{% static 'images/Fruits Basket.png' %}" alt="Logo" width="45" height="45" class="me-2 rounded-circle">
        Fruit Basket Admin
    </span>

        <div>

            <span class="me-3 fw-semibold text-dark">

                Welcome, {{ request.user.username }}

            </span>

            <a href="{% url 'admin_logout' %}"
               class="btn btn-dark">

                <i class="bi bi-box-arrow-right"></i>

                Logout

            </a>

        </div>

    </div>

</nav>


<div class="d-flex">

    <!-- Sidebar -->

    <div class="sidebar">

        <a href="{% url 'admin_dashboard' %}">
            <i class="bi bi-speedometer2"></i>
            Dashboard
        </a>

        <a href="{% url 'categories' %}">
            <i class="bi bi-grid"></i>
            Categories
        </a>

        <a href="{% url 'products' %}">
            <i class="bi bi-basket"></i>
            Products
        </a>

        <a href="{% url 'orders' %}">
            <i class="bi bi-bag-check"></i>
            Orders
        </a>

        <li class="nav-item">
            <a class="nav-link" href="{% url 'users' %}">
                <i class="bi bi-people-fill"></i> 
                       Users
            </a>
        </li>
    </div>

    <!-- Main Content -->

    <div class="content p-4">

        {% block content %}

        {% endblock %}

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
