{% extends 'nav/base.html' %}
{% load static %}

{% block content %}

<div class="container my-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-warning">

                    <h3 class="mb-0">

                        ⚙️ Account Settings

                    </h3>

                </div>

                <div class="card-body">

                    <div class="list-group">

                        <!-- Edit Profile -->

                        <a href="{% url 'profile' %}"
                           class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">

                            <span>

                                👤 Edit Profile

                            </span>

                            <i class="bi bi-chevron-right"></i>

                        </a>

                        <!-- Change Password -->

                       <a href="{% url 'change_password' %}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">


                        <span>🔒 Change Password</span>


                        <i class="bi bi-chevron-right"></i>

                    </a>
                        <!-- Delete Account -->

                        <a href="{% url 'delete_account' %}"
                           class="list-group-item list-group-item-action text-danger d-flex justify-content-between align-items-center">

                            <span>

                                ❌ Delete Account

                            </span>

                            <i class="bi bi-chevron-right"></i>

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
