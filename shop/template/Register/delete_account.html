{% extends 'nav/base.html' %}

{% block content %}

<div class="container my-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow border-danger">

                <div class="card-header bg-danger text-white">

                    <h3>Delete Account</h3>

                </div>

                <div class="card-body">
                    <p class="text-danger">

                        <strong>
                            Warning!
                        </strong>

                        This action cannot be undone.

                    </p>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label>

                                Enter Your Password

                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required>

                        </div>

                        <button
                            class="btn btn-danger w-100">

                            Delete My Account

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
